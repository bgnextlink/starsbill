[program:starbilling-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /home/starbilling/public_html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=starbilling
numprocs=4
redirect_stderr=true
stdout_logfile=/home/starbilling/public_html/storage/logs/worker.log
stopwaitsecs=3600
